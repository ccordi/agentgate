<svg viewBox="0 0 820 280" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>

  <!-- top text -->
  <text x="210" y="22" font-size="14" text-anchor="middle" fill="#222">agent wants to call a network tool</text>
  <line x1="210" y1="32" x2="210" y2="88" stroke="#444" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- PEP box -->
  <rect x="60" y="90" width="300" height="70" rx="6" fill="#fff" stroke="#444" stroke-width="1.5"/>
  <text x="210" y="113" font-size="14" font-weight="bold" text-anchor="middle" fill="#222">PEP (in the harness)</text>
  <text x="210" y="135" font-size="12" text-anchor="middle" fill="#555">the only network path</text>

  <!-- PDP box -->
  <rect x="460" y="90" width="300" height="70" rx="6" fill="#f0f6ff" stroke="#1f6feb" stroke-width="2.5"/>
  <text x="610" y="113" font-size="14" font-weight="bold" text-anchor="middle" fill="#1f3a5f">PDP (the gateway)</text>
  <text x="610" y="135" font-size="12" text-anchor="middle" fill="#555">decide against egress policy</text>

  <!-- ask arrow -->
  <line x1="360" y1="112" x2="460" y2="112" stroke="#444" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="410" y="102" font-size="12" text-anchor="middle" fill="#666">ask</text>

  <!-- allow/deny arrow -->
  <line x1="460" y1="142" x2="360" y2="142" stroke="#444" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="410" y="166" font-size="12" text-anchor="middle" fill="#666">allow / deny</text>

  <!-- final arrow down -->
  <line x1="210" y1="160" x2="210" y2="220" stroke="#444" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="210" y="245" font-size="14" text-anchor="middle" fill="#222">perform the request — or refuse</text>
</svg>
